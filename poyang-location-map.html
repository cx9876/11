<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鄱阳湖区位图</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    :root {
      --bg: #f5f2ec;
      --panel: rgba(255, 252, 247, 0.94);
      --ink: #2d3943;
      --muted: #6b7680;
      --accent: #4d7e65;
      --accent-soft: rgba(77, 126, 101, 0.1);
      --water: #5e9ccb;
      --water-soft: rgba(169, 211, 233, 0.18);
      --border: #d2d8da;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f7f4ef 0%, var(--bg) 100%);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 36px;
    }

    .header {
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 4vw, 50px);
      line-height: 1.15;
    }

    .subtitle {
      max-width: 920px;
      margin: 0;
      color: var(--accent);
      font-size: 18px;
      line-height: 1.7;
    }

    .layout {
      margin-top: 22px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.04);
    }

    .map-panel {
      overflow: hidden;
    }

    .map-top {
      padding: 20px 22px 14px;
      border-bottom: 1px solid rgba(210, 216, 218, 0.8);
    }

    .map-top h2 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .map-top p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 16px;
    }

    #map {
      width: 100%;
      height: 720px;
    }

    .caption {
      padding: 18px 22px 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .leaflet-control-attribution {
      font-size: 11px;
    }

    .text-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .lake-label {
      color: var(--accent);
      font-size: 18px;
    }

    .river-label {
      color: #3e6f96;
    }

    @media (max-width: 980px) {
      #map {
        height: 560px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="eyebrow">区位图</div>
      <h1>鄱阳湖区位图</h1>
      <p class="subtitle">
        鄱阳湖位于长江中下游，连接赣江、抚河、饶河、信江和修水。复杂的河湖关系与季节性水位波动，共同塑造了其独特的水质变化格局。
      </p>
    </header>

    <section class="layout">
      <section class="panel map-panel">
        <div class="map-top">
          <h2>长江中下游与鄱阳湖</h2>
          <p>主图突出鄱阳湖、长江、湖口以及五大入湖河流的空间关系。</p>
        </div>

        <div id="map" aria-label="鄱阳湖区位图"></div>

        <div class="caption">
          图注：鄱阳湖位于长江中下游，连接五大入湖河流。复杂的河湖关系与季节性水位波动，共同塑造了其独特的水质变化格局。
        </div>
      </section>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map("map", {
      zoomControl: true,
      scrollWheelZoom: true,
      minZoom: 7,
      maxZoom: 11
    });

    const esriWorldTopo = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
      {
        attribution: "Tiles &copy; Esri"
      }
    );

    const cartoLight = L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      {
        subdomains: "abcd",
        attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
      }
    );

    cartoLight.addTo(map);

    const bounds = L.latLngBounds(
      [28.0, 114.7],
      [30.25, 117.45]
    );
    map.fitBounds(bounds, { padding: [24, 24] });
    map.setMaxBounds(bounds.pad(0.12));

    const hukou = [29.731, 116.215];
    const poyangCenter = [28.95, 116.05];

    const lineStyle = {
      color: "#5e9ccb",
      weight: 3,
      opacity: 0.9,
      dashArray: "8 6"
    };

    const riverLines = [
      {
        name: "长江",
        coords: [
          [29.93, 114.90],
          [29.94, 115.55],
          [29.93, 116.18],
          [29.91, 116.85],
          [29.88, 117.35]
        ],
        label: [29.98, 116.82]
      },
      {
        name: "赣江",
        coords: [
          [28.10, 115.15],
          [28.35, 115.36],
          [28.58, 115.50],
          [28.82, 115.67],
          [29.00, 115.78]
        ],
        label: [28.12, 115.12]
      },
      {
        name: "抚河",
        coords: [
          [27.98, 116.02],
          [28.22, 115.94],
          [28.45, 115.82],
          [28.69, 115.72],
          [28.88, 115.63]
        ],
        label: [28.04, 116.10]
      },
      {
        name: "信江",
        coords: [
          [28.67, 117.10],
          [28.76, 116.86],
          [28.85, 116.60],
          [28.92, 116.35],
          [28.97, 116.13]
        ],
        label: [28.72, 117.16]
      },
      {
        name: "饶河",
        coords: [
          [29.08, 117.15],
          [29.15, 116.92],
          [29.23, 116.67],
          [29.31, 116.48]
        ],
        label: [29.18, 117.18]
      },
      {
        name: "修水",
        coords: [
          [29.60, 115.02],
          [29.58, 115.28],
          [29.56, 115.54],
          [29.53, 115.82],
          [29.50, 116.03]
        ],
        label: [29.63, 115.06]
      }
    ];

    riverLines.forEach((river) => {
      L.polyline(river.coords, lineStyle).addTo(map);
      L.marker(river.label, {
        icon: L.divIcon({
          className: "text-label river-label",
          html: river.name,
          iconSize: [60, 18]
        })
      }).addTo(map);
    });

    L.circleMarker(hukou, {
      radius: 7,
      color: "#4d7e65",
      fillColor: "#4d7e65",
      fillOpacity: 1,
      weight: 2
    }).addTo(map).bindTooltip("湖口", {
      permanent: true,
      direction: "right",
      offset: [10, 0],
      className: "text-label"
    });

    L.marker(poyangCenter, {
      icon: L.divIcon({
        className: "text-label lake-label",
        html: "鄱阳湖",
        iconSize: [90, 24]
      })
    }).addTo(map);

    L.marker([28.62, 115.90], {
      icon: L.divIcon({
        className: "text-label",
        html: "江西省",
        iconSize: [70, 18]
      })
    }).addTo(map);

    L.control.layers(
      {
        "浅色底图": cartoLight,
        "地形底图": esriWorldTopo
      },
      {},
      { collapsed: false }
    ).addTo(map);
  </script>
</body>
</html>
